services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env  # Injecte les variables (OPENAI_API_KEY, etc.) dans le conteneur backend
    environment:
      - DATABASE_URL=${DATABASE_URL}

    # [FIX] Mount the backend code into a 'backend' subdirectory to create a proper Python package.
    volumes:
      - ./backend:/app/backend

    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    networks: ["app-network"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    env_file:
      - .env  # Injecte aussi les variables pour le frontend (ex: VITE_API_URL)
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./front:/app          # Synchronise le code source
      - /app/node_modules     # Protège les modules installés dans le conteneur
    depends_on:
      - backend
    networks: ["app-network"]

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
