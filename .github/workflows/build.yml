name: Build and Push Docker Images

on:
  push:
    branches:
      - master
      - staging
  workflow_dispatch:

env:
  # Désactive l'avertissement de dépréciation Node.js dans GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # [OPTIMISATION] Initialisation de Buildx requise pour utiliser le cache
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase image owner
        run: |
          echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker tags
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=ghcr.io/${IMAGE_OWNER}/beyondthecv-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/${IMAGE_OWNER}/beyondthecv-frontend" >> "$GITHUB_ENV"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.VERSION }}
          # Utilisation du cache GitHub Actions pour accélérer les builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          # [CORRECTION] Remplacement de frontend par front pour correspondre au repo
          context: ./front
          file: ./front/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.VERSION }}
          build-args: |
            VITE_API_URL=${{ github.ref_name == 'staging' && 'https://api-staging.beyondthecv.app' || 'https://api.beyondthecv.app' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max