name: Backend CI/CD
# [DEBUG] Forçage d'un nouveau commit pour relancer la CI

on:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'
      # Déclenche aussi sur les changements du workflow lui-même
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'backend/**'

env:
  # Désactive l'avertissement de dépréciation Node.js en forçant la v24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Run Pytest
    runs-on: ubuntu-latest
    services:
      # Ajoute un conteneur de service PostgreSQL pour les tests
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        # Option pour attendre que PostgreSQL soit prêt
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # psycopg2-binary est plus fiable en CI que psycopg2
        pip install psycopg2-binary
        pip install -r backend/requirements.txt
        # Ajout de pytest-asyncio pour supporter les tests asynchrones
        pip install pytest pytest-mock pytest-asyncio

    - name: Run Tests
      env:
        # [FIX] Ajoute la racine du projet (.) ET le dossier backend pour corriger tous les imports
        PYTHONPATH: ".:backend"
        
        # Utilise la base de données du conteneur de service
        DATABASE_URL: "postgresql://user:password@localhost:5432/test_db"
        # Utilise l'IP explicite 127.0.0.1 pour éviter les bugs de résolution IPv6
        DATABASE_URL: "postgresql://user:password@127.0.0.1:5432/test_db"
        OPENAI_API_KEY: "dummy_key"
        GEMINI_API_KEY: "dummy_key"
      run: |
        # Affiche le contenu du répertoire courant pour faciliter le débogage dans les logs
        ls -la
        # Laisse Pytest découvrir automatiquement tous les dossiers et fichiers de tests
        pytest -v

  deploy:
    name: Deploy to Google Cloud Run
    # Ce job ne s'exécute que si le job 'test' a réussi
    needs: test
    # Ce job ne s'exécute que sur un push vers la branche 'main'
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    # Permissions nécessaires pour l'authentification OIDC
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Deploy to Cloud Run
      id: deploy
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        # Le nom de votre service Cloud Run
        service: 'beyondthecv-backend-service'
        # La région où se trouve votre service
        region: 'europe-west1'
        # Le chemin vers le code source contenant le Dockerfile
        source: ./backend
        # Passe le NOM du secret à la variable d'environnement DATABASE_SECRET_NAME
        # Ton code database.py s'attend au nom, pas à la valeur, c'est la bonne méthode.
        env_vars: |-
          DATABASE_SECRET_NAME=db-credentials
        # Monte la VALEUR des secrets directement dans les variables d'environnement
        secrets: |-
          OPENAI_API_KEY=openai-api-key:latest
          GEMINI_API_KEY=gemini-api-key:latest
          SERPER_API_KEY=serper-api-key:latest