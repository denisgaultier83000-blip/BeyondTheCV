name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed
    branches:
      - master
              - staging
      - staging1
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    # [FIX EXPERT] Prépare le terrain pour les Environnements GitHub Secrets si tu les utilises un jour
    environment: ${{ github.event.workflow_run.head_branch == 'master' && 'production' || (github.ref_name == 'master' && 'production' || 'staging') }}

    # Ne s'exécute que si le workflow de build a réussi, ou si lancé manuellement
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Sanitize Inputs
        id: sanitize
        # [FIX EXPERT] Nettoie l'IP pour éviter que l'action SSH ne tente de se connecter à un serveur fantôme à cause d'un saut de ligne
        env:
          RAW_IP: ${{ secrets.SERVER_HOST }}
        run: |
          CLEAN_IP=$(echo "$RAW_IP" | tr -d '\n\r ')
          
          if [ -z "$CLEAN_IP" ]; then
            echo "::error::Le secret SERVER_HOST est manquant ou vide. Le déploiement est annulé."
            exit 1
          fi
          
          echo "clean_ip=$CLEAN_IP" >> $GITHUB_OUTPUT

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Transfert sécurisé pour éviter l'évaluation par bash sur le VPS
          DB_USER: ${{ secrets.POSTGRES_USER }}
          DB_PASS: ${{ secrets.POSTGRES_PASSWORD }}
          DB_NAME: ${{ secrets.POSTGRES_DB }}
          OAI_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEM_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SEC: ${{ secrets.JWT_SECRET }}
          
          # [FIX EXPERT] Sécurisation de la variable de branche pour éviter les injections bash sur ton serveur
          TARGET_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DB_USER,DB_PASS,DB_NAME,OAI_KEY,GEM_KEY,JWT_SEC,TARGET_BRANCH,FRONTEND_URL
          script: |
            set -e

            BRANCH="$TARGET_BRANCH"

            if [ "$BRANCH" = "staging" ] || [ "$BRANCH" = "staging1" ]; then
              COMPOSE_FILE="docker-compose.staging.yml"
              PROJECT_NAME="btcv-staging"
              ENVIRONMENT="staging"
              API_HOST="api-staging.beyondthecv.app"
              FRONTEND_URL="https://staging.beyondthecv.app"
            elif [ "$BRANCH" = "master" ]; then
              COMPOSE_FILE="docker-compose.prod.yml"
              PROJECT_NAME="btcv-prod"
              ENVIRONMENT="production"
              API_HOST="api.beyondthecv.app"
              FRONTEND_URL="https://beyondthecv.app"
            else
              echo "Unsupported branch: $BRANCH"
              exit 1
            fi

            # Isoler physiquement les environnements
            APP_DIR="/app/beyondthecv-$ENVIRONMENT"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "Deploy branch: $BRANCH in $APP_DIR"

            # Clone initial si le dossier vient d'être créé
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            fi

            git fetch origin
            git reset --hard "origin/$BRANCH"

            ENV_FILE=".env"

            SAFE_DB_PASS="${DB_PASS//\$/\$\$}"
            SAFE_JWT_SEC="${JWT_SEC//\$/\$\$}"
            SAFE_OAI_KEY="${OAI_KEY//\$/\$\$}"
            SAFE_GEM_KEY="${GEM_KEY//\$/\$\$}"

            cat <<EOF > "$ENV_FILE"
            VERSION=${BRANCH}
            ENVIRONMENT=${ENVIRONMENT}
            API_HOST=${API_HOST}
            FRONTEND_URL=${FRONTEND_URL}
            POSTGRES_USER=${DB_USER}
            POSTGRES_PASSWORD=${SAFE_DB_PASS}
            POSTGRES_DB=${DB_NAME}
            OPENAI_API_KEY=${SAFE_OAI_KEY}
            GEMINI_API_KEY=${SAFE_GEM_KEY}
            JWT_SECRET=${SAFE_JWT_SEC}
            EOF

            # [FIX RESEAU] On reconnecte sur le réseau 'web' standard de Traefik pour rétablir la communication.
            # L'isolation sécurité reste garantie par les réseaux internes (btcv-staging-internal et btcv-prod-internal).
            WEB_NETWORK="web"
            docker network inspect "$WEB_NETWORK" >/dev/null 2>&1 || docker network create "$WEB_NETWORK"

            # Libérer de l'espace disque AVANT de télécharger de nouvelles images
            docker image prune -a -f

            docker compose \
              -p "$PROJECT_NAME" \
              -f "$COMPOSE_FILE" \
              pull

            docker compose \
              -p "$PROJECT_NAME" \
              -f "$COMPOSE_FILE" \
              up -d --force-recreate --remove-orphans

            # Sécurise le fichier pour qu'il reste disponible pour les redémarrages Docker
            chmod 600 "$ENV_FILE"

            docker image prune -f

            echo "Deploy finished: $ENVIRONMENT"
