name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed
    branches:
      - master
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # [FIX EXPERT] Prépare le terrain pour les Environnements GitHub Secrets si tu les utilises un jour
    environment: ${{ github.event.workflow_run.head_branch == 'master' && 'production' || (github.ref_name == 'master' && 'production' || 'staging') }}
    # Ne s'exécute que si le workflow de build a réussi, ou si lancé manuellement
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Transfert sécurisé pour éviter l'évaluation par bash sur le VPS
          DB_USER: ${{ secrets.POSTGRES_USER }}
          DB_PASS: ${{ secrets.POSTGRES_PASSWORD }}
          DB_NAME: ${{ secrets.POSTGRES_DB }}
          OAI_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEM_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SEC: ${{ secrets.JWT_SECRET }}
          # [FIX EXPERT] Sécurisation de la variable de branche pour éviter les injections bash sur ton serveur
          TARGET_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DB_USER,DB_PASS,DB_NAME,OAI_KEY,GEM_KEY,JWT_SEC,TARGET_BRANCH
          script: |
            set -e

            APP_DIR="/app/beyondthecv"
            
            # [FIX EXPERT] Appel de la branche depuis l'environnement
            BRANCH="$TARGET_BRANCH"

            cd "$APP_DIR"

            echo "Deploy branch: $BRANCH"

            git fetch origin
            git reset --hard "origin/$BRANCH"

            if [ "$BRANCH" = "staging" ]; then
              COMPOSE_FILE="docker-compose.staging.yml"
              PROJECT_NAME="btcv-staging"
              ENVIRONMENT="staging"
              API_URL="https://api-staging.beyondthecv.app"
            elif [ "$BRANCH" = "master" ]; then
              COMPOSE_FILE="docker-compose.prod.yml"
              PROJECT_NAME="btcv-prod"
              ENVIRONMENT="production"
              API_URL="https://api.beyondthecv.app"
            else
              echo "Unsupported branch: $BRANCH"
              exit 1
            fi

            ENV_FILE=$(mktemp)

            # [FIX EXPERT] Échappe les '$' en '$$' pour que Docker Compose ne détruise pas tes secrets
            SAFE_DB_PASS="${DB_PASS//\$/\$\$}"
            SAFE_JWT_SEC="${JWT_SEC//\$/\$\$}"
            SAFE_OAI_KEY="${OAI_KEY//\$/\$\$}"
            SAFE_GEM_KEY="${GEM_KEY//\$/\$\$}"

            cat <<EOF > "$ENV_FILE"
            VERSION='$BRANCH'
            ENVIRONMENT='$ENVIRONMENT'
            POSTGRES_USER='$DB_USER'
            POSTGRES_PASSWORD='$SAFE_DB_PASS'
            POSTGRES_DB='$DB_NAME'
            OPENAI_API_KEY='$SAFE_OAI_KEY'
            GEMINI_API_KEY='$SAFE_GEM_KEY'
            JWT_SECRET='$SAFE_JWT_SEC'
            EOF

            docker network inspect web >/dev/null 2>&1 || docker network create web

            docker compose \
              -p "$PROJECT_NAME" \
              -f "$COMPOSE_FILE" \
              --env-file "$ENV_FILE" \
              pull

            docker compose \
              -p "$PROJECT_NAME" \
              -f "$COMPOSE_FILE" \
              --env-file "$ENV_FILE" \
              up -d --remove-orphans

            rm -f "$ENV_FILE"

            docker image prune -f

            echo "Deploy finished: $ENVIRONMENT"