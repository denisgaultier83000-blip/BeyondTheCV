name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed
    branches:
      - master
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Ne s'exÃĐcute que si le workflow de build a rÃĐussi, ou si lancÃĐ manuellement
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Sanitize Inputs
        # [FIX EXPERT] Nettoie l'IP pour ÃĐviter que l'action SSH ne tente de se connecter Ã  un serveur fantÃīme Ã  cause d'un saut de ligne
        env:
          RAW_IP: ${{ secrets.SERVER_IP }}
        run: |
          CLEAN_IP=$(echo "$RAW_IP" | tr -d '\n\r ')
          echo "CLEAN_IP=$CLEAN_IP" >> $GITHUB_ENV

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Transfert sÃĐcurisÃĐ pour ÃĐviter l'ÃĐvaluation par bash sur le VPS
          DB_USER: ${{ secrets.POSTGRES_USER }}
          DB_PASS: ${{ secrets.POSTGRES_PASSWORD }}
          DB_NAME: ${{ secrets.POSTGRES_DB }}
          OAI_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEM_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SEC: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ env.CLEAN_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DB_USER,DB_PASS,DB_NAME,OAI_KEY,GEM_KEY,JWT_SEC
          script: |
            set -e

            APP_DIR="/app/beyondthecv"
            
            # GÃĻre la diffÃĐrence entre workflow_run (auto) et workflow_dispatch (manuel)
            BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"

            cd "$APP_DIR"

            echo "Deploy branch: $BRANCH"

            git fetch origin
            git reset --hard "origin/$BRANCH"

            if [ "$BRANCH" = "staging" ]; then
              COMPOSE_FILE="docker-compose.staging.yml"
              PROJECT_NAME="btcv-staging"
              ENVIRONMENT="staging"
              API_URL="https://api-staging.beyondthecv.app"
            elif [ "$BRANCH" = "master" ]; then
              COMPOSE_FILE="docker-compose.prod.yml"
              PROJECT_NAME="btcv-prod"
              ENVIRONMENT="production"
              API_URL="https://api.beyondthecv.app"
            else
              echo "Unsupported branch: $BRANCH"
              exit 1
            fi

            ENV_FILE=$(mktemp)

            cat <<EOF > "$ENV_FILE"
            VERSION=$BRANCH
            ENVIRONMENT=$ENVIRONMENT
            POSTGRES_USER=$DB_USER
            POSTGRES_PASSWORD=$DB_PASS
            POSTGRES_DB=$DB_NAME
            OPENAI_API_KEY=$OAI_KEY
            GEMINI_API_KEY=$GEM_KEY
            JWT_SECRET=$JWT_SEC
            EOF

            docker network inspect web >/dev/null 2>&1 || docker network create web

            docker compose \
              -p "$PROJECT_NAME" \
              -f "$COMPOSE_FILE" \
              --env-file "$ENV_FILE" \
              pull

            docker compose \
              -p "$PROJECT_NAME" \
              -f "$COMPOSE_FILE" \
              --env-file "$ENV_FILE" \
              up -d --force-recreate --remove-orphans

            rm -f "$ENV_FILE"

            docker image prune -f

            echo "Deploy finished: $ENVIRONMENT"