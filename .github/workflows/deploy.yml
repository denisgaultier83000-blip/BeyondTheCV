name: Deploy to Production

# On ne déploie en production QUE lorsqu'on fusionne du code validé sur la branche principale
on:
  push:
    branches:
      - master
  # [OPT OPTIMISATION] Permet de lancer le workflow manuellement depuis l'interface GitHub
  workflow_dispatch:

jobs:
  deploy:
    # On cible le runner auto-hébergé qui tourne sur le VPS
    runs-on: self-hosted
    steps:
      # Étape 1: Récupération du code de la branche master
      - name: Checkout repository
        uses: actions/checkout@v4

      # Étape 2: Déploiement direct avec Docker Compose
      - name: Deploy Application
        run: |
          echo "Déploiement en cours..."
          # Docker Compose va automatiquement trouver et utiliser le fichier .env
          # --remove-orphans nettoie les conteneurs des services supprimés
          docker compose --env-file ../.env -f docker-compose.prod.yml down
          docker compose --env-file ../.env -f docker-compose.prod.yml up --build -d --remove-orphans