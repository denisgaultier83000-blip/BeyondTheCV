name: Deploy to Production

# On ne déploie en production QUE lorsqu'on fusionne du code validé sur la branche principale
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connexion SSH et Déploiement
        # [FIX] On fige la version de l'action. Ne jamais utiliser @master en production.
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # [FIX] Arrête immédiatement le script à la première erreur (évite l'effet boule de neige)
          script_stop: true
          # [OPT] Timeout explicite de connexion pour échouer plus vite en cas de blocage réseau
          timeout: 30s
          script: |
            # [FIX] On utilise le chemin absolu correct sur le VPS Google
            cd /home/denis_gaultier83000/beyondthecv/beyondthecv || exit 1
            git pull origin master
            # [FIX] On force l'utilisation du fichier de production
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up --build -d