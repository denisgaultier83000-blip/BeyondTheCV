server {
    # [FIX] Nginx écoute sur le port 80, le port standard pour le web.
    listen 80;

    # Définit la racine où se trouvent les fichiers de l'application.
    root /usr/share/nginx/html;
    index index.html;

    # [SÉCURITÉ] Empêche l'accès direct aux fichiers cachés (ex: .env).
    location ~ /\. {
        deny all;
    }

    # [FIX CRITIQUE] C'est la règle qui résout le 404.
    # Pour toute requête, Nginx essaie de trouver un fichier ($uri), puis un dossier ($uri/),
    # et si rien n'est trouvé, il renvoie /index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}