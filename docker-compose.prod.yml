services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: beyondthecv
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: root
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # URL de connexion à la base de données PostgreSQL
      - DATABASE_URL=postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD}@db:5432/beyondthecv
    depends_on:
      - db
    # On retire le mode --reload pour des performances et une stabilité maximales
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
    networks:
      - app-network

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      # Nginx écoute désormais sur 8080 (Standard Cloud Run)
      - "80:8080"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    # Volume Docker sécurisé pour les données PostgreSQL