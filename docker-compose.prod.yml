services:

  db:
    image: postgres:15-alpine
    container_name: db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - internal

  backend:
    image: ghcr.io/denisgaultier83000-blip/backend:${VERSION}
    container_name: backend-prod
    restart: unless-stopped

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}

    depends_on:
      - db

    networks:
      - internal
      - web

    labels:
      - traefik.enable=true
      - traefik.http.routers.backend-prod.rule=Host(`api.beyondthecv.app`)
      - traefik.http.routers.backend-prod.entrypoints=websecure
      - traefik.http.routers.backend-prod.tls.certresolver=le
      - traefik.http.services.backend-prod.loadbalancer.server.port=8080

  frontend:
    image: ghcr.io/denisgaultier83000-blip/frontend:${VERSION}
    container_name: frontend-prod
    restart: unless-stopped

    networks:
      - web

    labels:
      - traefik.enable=true
      - traefik.http.routers.front-prod.rule=Host(`beyondthecv.app`)
      - traefik.http.routers.front-prod.entrypoints=websecure
      - traefik.http.routers.front-prod.tls.certresolver=le
      - traefik.http.services.front-prod.loadbalancer.server.port=80

networks:
  internal:
    driver: bridge
  web:
    external: true

volumes:
  postgres_data_prod: