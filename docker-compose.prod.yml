services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
    # On retire le mode --reload pour des performances et une stabilité maximales
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
    networks:
      - app-network

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        # Injecte l'URL de l'API depuis la variable d'environnement du serveur au moment du build
        - VITE_API_URL=${VITE_API_URL}
    ports:
      # [FIX] Nginx écoute sur le port standard 80 à l'intérieur du conteneur (VPS classique)
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    # Volume Docker sécurisé pour les données PostgreSQL