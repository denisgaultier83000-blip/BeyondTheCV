services:
  db:
    image: postgres:15-alpine
    container_name: btcv-db-prod
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - btcv_postgres_data_prod:/var/lib/postgresql/data

    networks:
      - btcv-prod-internal

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/denisgaultier83000-blip/beyondthecv-backend:${VERSION}
    container_name: btcv-backend-prod
    restart: unless-stopped

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ENVIRONMENT: production

    depends_on:
      db:
        condition: service_healthy

    networks:
      - btcv-prod-internal
      - web

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"

      - "traefik.http.routers.btcv-api-prod.rule=Host(`api.beyondthecv.app`)"
      - "traefik.http.routers.btcv-api-prod.entrypoints=websecure"
      - "traefik.http.routers.btcv-api-prod.tls.certresolver=le"
      - "traefik.http.routers.btcv-api-prod.service=btcv-api-prod"

      - "traefik.http.services.btcv-api-prod.loadbalancer.server.port=8080"

  frontend:
    image: ghcr.io/denisgaultier83000-blip/beyondthecv-frontend:${VERSION}
    container_name: btcv-frontend-prod
    restart: unless-stopped

    environment:
      ENVIRONMENT: production

    networks:
      - web

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"

      - "traefik.http.routers.btcv-front-prod.rule=Host(`beyondthecv.app`) || Host(`www.beyondthecv.app`)"
      - "traefik.http.routers.btcv-front-prod.entrypoints=websecure"
      - "traefik.http.routers.btcv-front-prod.tls.certresolver=le"
      - "traefik.http.routers.btcv-front-prod.service=btcv-front-prod"

      - "traefik.http.services.btcv-front-prod.loadbalancer.server.port=80"

networks:
  btcv-prod-internal:
    driver: bridge
  web:
    external: true

volumes:
  btcv_postgres_data_prod: